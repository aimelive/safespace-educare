      .brand-name {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', sans-serif;
        font-size: 20px;
        font-weight: 700;
        fill: white;
      }
      .brand-sub {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', sans-serif;
        font-size: 11px;
        font-weight: 600;
        fill: #CC1A2E;
        letter-spacing: 3px;
      }
    </style>
  </defs>

  <!-- Icon: ALU Navy rounded square -->
